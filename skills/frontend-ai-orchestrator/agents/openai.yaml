interface:
  display_name: "Frontend AI Orchestrator"
  short_description: "Route frontend delivery through gated phases and design-mode selection."
  default_prompt: "Run intake/scaffold (if greenfield) by delegating phase 0 to frontend-scaffold-intake, require the full scaffold handoff payload before phase 1, use temp staging for non-empty-workspace root placement, then run combined plan+design contract: `brainstorming` -> `writing-plans` -> choose the best-fit design authority from ui-ux-pro-max, design-system, ui-styling, or existing-design alignment. Write phase-1 contract artifacts to `.orchestrator/contracts/SPEC.md`, `.orchestrator/contracts/PLAN.md`, and `.orchestrator/contracts/DESIGN.md`, then build with `executing-plans`/`systematic-debugging`/`test-driven-development`, optional browser QA/refine, regression testing with Playwright, and release validation with `verification-before-completion`. Ask for optional library choices before scaffolding, default to pnpm unless the user asks for a different package manager, preserve an existing design/template by default, and write `.orchestrator/status/*.json` phase artifacts throughout."
